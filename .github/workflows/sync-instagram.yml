name: Sync Instagram Posts

on:
  # Run daily at 6 AM UTC (automatically)
  schedule:
    - cron: '0 6 * * *'
  
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # Allow pushing commits
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run Instagram sync
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
        run: node scripts/sync-instagram.js
      
      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Instagram Sync Bot"
      
      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "✅ No changes to commit"
          else
            echo "📝 Committing changes..."
            git add posts/instagram-feed.json assets/images/instagram/
            git commit -m "🤖 Auto-sync Instagram posts - $(date -u +'%Y-%m-%d %H:%M:%S') UTC"
            git push
            echo "✅ Changes pushed to repository"
          fi
      
      - name: Workflow summary
        if: always()
        run: |
          echo "## 📊 Instagram Sync Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(date -u +'%Y-%m-%d %H:%M:%S') UTC" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Success" >> $GITHUB_STEP_SUMMARY
          echo "- **Next scheduled run**: Daily at 06:00 UTC" >> $GITHUB_STEP_SUMMARY
